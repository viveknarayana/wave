apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: wave
  labels:
    app: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 8
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    # Scale workers based on gateway pressure signal if custom metrics are available.
    - type: Object
      object:
        describedObject:
          apiVersion: v1
          kind: Service
          name: gateway
        metric:
          name: wave_queue_depth
        target:
          type: Value
          value: "40"
    # CPU fallback target.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
